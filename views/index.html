<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal MPI</title>
    <meta name="mpi-image" content="{{MPI_IMAGE}}">
    <meta name="user-id" content="{{USER_ID}}">
    <link rel="stylesheet" href="/xterm/css/xterm.css" />
    <style>
        body { background-color: #2d2d2d; color: #f1f1f1; padding: 20px; font-family: sans-serif; }
        #terminal-container { display: none; }
        #terminal { width: 100%; height: 80vh; }
        #setup-container { padding: 30px; background-color: #1e1e1e; border-radius: 8px; text-align: center; }
        input { padding: 10px; margin-right: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        /* --- NOVO ESTILO PARA A LISTA --- */
        #machine-list { list-style: none; padding: 0; }
        #machine-list li { background-color: #3c3c3c; margin: 5px 0; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Cluster via Web Terminal - Bem-vindo, {{NOME_USUARIO}}!</h1>

    <div id="setup-container">
        <h2>Configuração do Cluster</h2>
        <p>Você está usando a imagem: {{MPI_IMAGE}}</p>
        <p>Quantos nós (máquinas) você deseja para sua aplicação MPI?</p>
        <form id="setup-form">
            <input type="number" id="num-machines" value="2" min="1" required>
            <select id="select-backup" style="padding: 10px; margin-right: 10px;">
            <option value="">-- Começar do Zero (Vazio) --</option>
            </select>
            <button type="submit">Iniciar Terminal</button>
        </form>
    </div>

    <div id="terminal-container">
        <div id="machine-info">
            <h3>Máquinas Disponíveis:</h3>
            <ul id="machine-list">
                </ul>
        </div>
        <hr> <div id="terminal"></div>
    </div>

    <div id="backup-ui" style="display:none; margin: 15px 0; background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid #444;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 10px;">
            <h3 style="margin: 0; font-size: 1.1em;">📂 Meus Arquivos</h3>
            <small id="status-cota" style="color: #aaa; background: #222; padding: 5px 10px; border-radius: 15px; border: 1px solid #444; font-size: 0.85em;">
                Calculando...
        </small>
        </div>

        <ul id="lista-backups" style="list-style: none; padding-left: 0; max-height: 200px; overflow-y: auto; background: #1e1e1e; border-radius: 4px; padding: 5px; margin-bottom: 15px;"></ul>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="nome-backup" placeholder="Nome do novo arquivo..." style="flex:1; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #222; color: white;">
            <button id="btn-salvar-novo" style="background: #28a745; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;">Salvar Novo</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/xterm/lib/xterm.js"></script>
    <script src="/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="client.js"></script>
</body>
</html>
